shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3

packages:
  - playground
  - docs
ignoredBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - shadcn-docs-nuxt
  - unrs-resolver
  - vue-demi
onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - sharp
  - simple-git-hooks

overrides:
  magic-regexp: "link:."
  nuxt: "4.3.1"
  vite: "7.3.1"
  vue: "3.5.29"
